<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} — Programming Wiki</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <!-- Навигация -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="/" class="logo">
                Вики
            </a>

            <ul class="nav-links">
                <li><a href="/">Главная</a></li>
                <li><a href="/languages">Языки</a></li>
                <li><a href="/libraries">Библиотеки</a></li>
            </ul>

            <!-- Поиск -->
            <form class="search-form" action="/search" method="get">
                <input
                    type="text"
                    name="q"
                    placeholder="Поиск языков и библиотек..."
                    class="search-input"
                    value="{{ query if query else '' }}"
                >
                <button type="submit" class="search-btn">🔍</button>
            </form>
        </div>
    </nav>

    <!-- Основной контент -->
    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Футер -->
    <footer class="footer">
        <div class="container">
            <p>Programming Wiki — учебный проект. Пожалуйста. поставьте пятёрочку.</p>
        </div>
    </footer>

</body>
</html>
